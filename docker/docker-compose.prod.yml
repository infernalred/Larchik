services:
  loki:
    image: grafana/loki:3.2.1
    container_name: ${APP_NAME}-loki
    command: -config.file=/etc/loki/config.yml
    volumes:
      - ./observability/loki/config.yml:/etc/loki/config.yml:ro
      - loki-data:/loki
    networks:
      - observability
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3100/ready"]
      interval: 5s
      timeout: 3s
      retries: 20

  grafana:
    image: grafana/grafana:11.2.0
    container_name: ${APP_NAME}-grafana
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
      GF_SERVER_ROOT_URL: https://${GRAFANA_HOST}
      GF_SERVER_HTTP_PORT: ${GRAFANA_CONTAINER_PORT}
    volumes:
      - grafana-data:/var/lib/grafana
      - ./observability/grafana/provisioning:/etc/grafana/provisioning:ro
    networks:
      - proxy
      - observability
    restart: unless-stopped
    depends_on:
      loki:
        condition: service_healthy
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=proxy"
      - "traefik.http.routers.${APP_NAME}-grafana.rule=Host(`${GRAFANA_HOST}`)"
      - "traefik.http.routers.${APP_NAME}-grafana.entrypoints=websecure"
      - "traefik.http.routers.${APP_NAME}-grafana.tls=true"
      - "traefik.http.services.${APP_NAME}-grafana.loadbalancer.server.port=${GRAFANA_CONTAINER_PORT}"

  db:
    image: postgres:16-alpine
    container_name: ${APP_NAME}-db
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "${DB_HOST_PORT}:5432"
    volumes:
      - db-data:/var/lib/postgresql/data
    networks:
      - backend
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 5s
      timeout: 3s
      retries: 20

  api:
    image: ghcr.io/${GHCR_REPO}/larchik-api:latest
    container_name: ${APP_NAME}-api
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__DefaultConnection: Host=${APP_NAME}-db;Port=5432;Database=${DB_NAME};Username=${DB_USER};Password=${DB_PASSWORD}
      Cors__Origins: https://${WEB_HOST}
      Frontend__BaseUrl: https://${WEB_HOST}
      Admin__Email: ${ADMIN_EMAIL}
      Admin__Password: ${ADMIN_PASSWORD}
      Serilog__WriteTo__1__Args__uri: ${LOKI_URL:-http://${APP_NAME}-loki:3100}
    networks:
      - proxy
      - backend
      - observability
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      loki:
        condition: service_healthy
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=proxy"
      - "traefik.http.routers.${APP_NAME}-api.rule=Host(`${WEB_HOST}`) && PathPrefix(`/api`)"
      - "traefik.http.routers.${APP_NAME}-api.entrypoints=websecure"
      - "traefik.http.routers.${APP_NAME}-api.tls=true"
      - "traefik.http.routers.${APP_NAME}-api.priority=100"
      - "traefik.http.services.${APP_NAME}-api.loadbalancer.server.port=8080"

  jobs:
    image: ghcr.io/${GHCR_REPO}/larchik-jobs:latest
    container_name: ${APP_NAME}-jobs
    environment:
      DOTNET_ENVIRONMENT: Production
      ConnectionStrings__DefaultConnection: Host=${APP_NAME}-db;Port=5432;Database=${DB_NAME};Username=${DB_USER};Password=${DB_PASSWORD}
      BackgroundJobs__Enabled: true
      BackgroundJobs__TbankPricesDaily__Token: ${TBANK_TOKEN}
      BackgroundJobs__TbankInstrumentInfoDaily__Token: ${TBANK_TOKEN}
      Serilog__WriteTo__1__Args__uri: ${LOKI_URL:-http://${APP_NAME}-loki:3100}
    networks:
      - backend
      - observability
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      loki:
        condition: service_healthy

  web:
    image: ghcr.io/${GHCR_REPO}/larchik-web:latest
    container_name: ${APP_NAME}-web
    networks:
      - proxy
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=proxy"
      - "traefik.http.routers.${APP_NAME}-web.rule=Host(`${WEB_HOST}`) && !PathPrefix(`/api`)"
      - "traefik.http.routers.${APP_NAME}-web.entrypoints=websecure"
      - "traefik.http.routers.${APP_NAME}-web.tls=true"
      - "traefik.http.routers.${APP_NAME}-web.priority=10"
      - "traefik.http.services.${APP_NAME}-web.loadbalancer.server.port=80"

networks:
  proxy:
    external: true
    name: proxy
  backend:
  observability:
    external: true
    name: observability

volumes:
  db-data:
    name: db-data-${APP_NAME}
  grafana-data:
    name: grafana-data-${APP_NAME}
  loki-data:
    name: loki-data-${APP_NAME}
