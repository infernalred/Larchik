name: Build and Deploy (larchik)

on:
  push:
    branches: [ main ]

env:
  APP_NAME: larchik
  APP_DIR: /opt/apps/larchik

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Resolve lowercase repository path
        id: meta
        run: echo "repo_lc=${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push API
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./docker/api.Dockerfile
          push: true
          tags: ghcr.io/${{ steps.meta.outputs.repo_lc }}/larchik-api:latest

      - name: Build & push Jobs
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./docker/jobs.Dockerfile
          push: true
          tags: ghcr.io/${{ steps.meta.outputs.repo_lc }}/larchik-jobs:latest

      - name: Build & push Web
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./docker/web.Dockerfile
          build-args: |
            VITE_API_BASE=/api
            VITE_IMPORT_MAX_FILE_SIZE_MB=10
          push: true
          tags: ghcr.io/${{ steps.meta.outputs.repo_lc }}/larchik-web:latest

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Resolve lowercase repository path
        id: meta
        run: echo "repo_lc=${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"

      - name: Copy compose to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          password: ${{ secrets.SSH_PASSWORD }}
          port: ${{ secrets.SSH_PORT || 22 }}
          source: "docker/docker-compose.prod.yml,docker/observability/**"
          target: "${{ env.APP_DIR }}"

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          password: ${{ secrets.SSH_PASSWORD }}
          port: ${{ secrets.SSH_PORT || 22 }}
          script: |
            set -e

            APP_DIR="${{ env.APP_DIR }}"
            APP_NAME="${{ env.APP_NAME }}"

            mkdir -p "${APP_DIR}"
            cd "${APP_DIR}"

            mv docker/docker-compose.prod.yml docker-compose.prod.yml || true
            mkdir -p observability
            cp -R docker/observability/. observability/ || true

            cat > .env <<'EOF'
            APP_NAME=${{ env.APP_NAME }}
            GHCR_REPO=${{ steps.meta.outputs.repo_lc }}
            WEB_HOST=${{ secrets.LARCHIK_WEB_HOST }}
            GRAFANA_HOST=${{ secrets.LARCHIK_GRAFANA_HOST }}
            GRAFANA_CONTAINER_PORT=3302
            DB_HOST_PORT=5434
            LOKI_URL=http://larchik-loki:3100

            DB_USER='${{ secrets.LARCHIK_DB_USER }}'
            DB_PASSWORD='${{ secrets.LARCHIK_DB_PASSWORD }}'
            DB_NAME='${{ secrets.LARCHIK_DB_NAME }}'

            ADMIN_EMAIL='${{ secrets.LARCHIK_ADMIN_EMAIL }}'
            ADMIN_PASSWORD='${{ secrets.LARCHIK_ADMIN_PASSWORD }}'
            TBANK_TOKEN='${{ secrets.LARCHIK_TBANK_TOKEN }}'

            GRAFANA_ADMIN_USER=admin
            GRAFANA_ADMIN_PASSWORD='${{ secrets.LARCHIK_GRAFANA_ADMIN_PASSWORD }}'
            EOF

            set -a
            . ./.env
            set +a

            docker network inspect proxy >/dev/null 2>&1 || docker network create proxy
            docker network inspect observability >/dev/null 2>&1 || docker network create observability

            echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u "${{ secrets.GHCR_USER }}" --password-stdin

            docker compose -f docker-compose.prod.yml --env-file .env pull
            docker compose -f docker-compose.prod.yml --env-file .env up -d

            docker image prune -f
